# AetheriaForge Databricks Asset Bundle
# See: https://docs.databricks.com/dev-tools/bundles/

bundle:
  name: aetheriaforge

include:
  - "resources/*.yml"

variables:
  catalog:
    description: Existing Unity Catalog catalog name
  schema:
    description: Unity Catalog schema name
    default: default
  runtime_volume:
    description: Unity Catalog volume name shared by the Databricks app and job
    default: aetheriaforge_runtime
  contract_path:
    description: Path to the forge contract YAML (leave blank for template/demo)
    default: ""
  contracts_dir:
    description: Shared forge contract directory for the Databricks app
    default: /Volumes/${var.catalog}/${var.schema}/${var.runtime_volume}/contracts
  evidence_dir:
    description: Shared evidence output directory for the Databricks app and job
    default: /Volumes/${var.catalog}/${var.schema}/${var.runtime_volume}/evidence

targets:
  dev:
    default: true
    mode: development
  prod:
    mode: production
