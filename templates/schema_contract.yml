# AetheriaForge — Schema Contract Template
# Defines the expected schema for a target Medallion layer.

contract:
  name: example_schema
  version: "1.0.0"
  layer: silver

columns:
  - name: id
    type: long
    nullable: false
  - name: name
    type: string
    nullable: false
    transforms:
      - op: strip
  - name: amount
    type: double
    nullable: true
    transforms:
      - op: round
        value: 2
  - name: event_date
    type: date
    nullable: false
  - name: updated_at
    type: timestamp
    nullable: false

enforcement:
  unknown_columns: reject  # reject | ignore | quarantine
  type_coercion: true
  null_violation: quarantine
