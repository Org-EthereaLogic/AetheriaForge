# AetheriaForge — Forge Contract Template
# Copy and customize for each registered dataset.

dataset:
  name: example_dataset
  version: "1.0.0"

source:
  catalog: my_catalog
  schema: bronze
  table: raw_records
  # path: data/raw_records.parquet
  # format: parquet

target:
  catalog: my_catalog
  schema: silver
  table: forged_records
  # path: data/forged_records.parquet
  # format: parquet

coherence:
  engine: shannon
  thresholds:
    bronze_min: 0.5
    silver_min: 0.75
    gold_min: 0.95

schema_contract:
  path: schema_contract.yml
  enforce: true
  evolution: versioned
  coerce_types: true
  unknown_columns: ignore
  null_violation: quarantine

resolution:
  enabled: false
  # policy_path: resolution_policy.yml
  # secondary_source:
  #   catalog: my_catalog
  #   schema: bronze
  #   table: raw_records_secondary

temporal:
  enabled: false
  # timestamp_column: updated_at
  # merge_strategy: latest_wins
  # conflict_behavior: record_and_warn
  # entity_key_columns: [id]

integration:
  enabled: false
  events_dir: ./integration/events
  drift_dir: ./integration/drift
  auto_ingest: false
