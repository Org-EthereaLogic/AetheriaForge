name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for PyPI trusted publishing (OIDC)
  artifact-metadata: write

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: aetheriaforge
      url: https://pypi.org/p/etherealogic-aetheriaforge

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

      - name: Upload PyPI storage records to GitHub linked artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: etherealogic-aetheriaforge
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import time
          import tomllib
          import urllib.request

          root = pathlib.Path(".")
          pyproject = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          package_name = pyproject["project"]["name"]
          dist_dir = root / "dist"
          distribution_files = sorted(
              path
              for path in dist_dir.iterdir()
              if path.is_file()
              and (path.suffix == ".whl" or path.name.endswith(".tar.gz"))
          )
          if not distribution_files:
              raise SystemExit("No built distributions found in dist/.")
          output_dir = root / ".linked-artifacts"
          output_dir.mkdir(exist_ok=True)

          metadata = None
          missing = []
          for _ in range(10):
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/{package_name}/{version}/json"
              ) as response:
                  metadata = json.load(response)
              available = {entry["filename"]: entry for entry in metadata["urls"]}
              missing = [path.name for path in distribution_files if path.name not in available]
              if not missing:
                  break
              time.sleep(5)

          if missing:
              raise SystemExit(
                  f"PyPI metadata did not list uploaded files for version {version}: {missing}"
              )

          for path in distribution_files:
              file_info = available[path.name]
              payload = {
                  "name": package_name,
                  "version": version,
                  "digest": f"sha256:{hashlib.sha256(path.read_bytes()).hexdigest()}",
                  "registry_url": "https://pypi.org",
                  "repository": package_name,
                  "artifact_url": file_info["url"],
                  "github_repository": os.environ["GITHUB_REPOSITORY"].split("/", 1)[-1],
              }
              target = output_dir / f"{path.name}.json"
              target.write_text(json.dumps(payload), encoding="utf-8")
              print(target)
          PY

          while IFS= read -r payload; do
            gh api \
              --method POST \
              "orgs/${GITHUB_REPOSITORY_OWNER}/artifacts/metadata/storage-record" \
              --input "$payload"
          done < <(find .linked-artifacts -type f -name '*.json' | sort)
          rm -rf .linked-artifacts
